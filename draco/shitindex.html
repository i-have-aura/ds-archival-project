<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GLTF Scene Viewer</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #menu {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.8);
    padding: 20px;
    border-radius: 8px;
    color: white;
    z-index: 1000;
  }
  #menu h2 {
    margin: 0 0 15px 0;
    font-size: 18px;
  }
  #menu button {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }
  #menu button:hover { background: #45a049; }
  #menu button:active { background: #3d8b40; }
  #info {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
  }
  #controls {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.8);
    padding: 20px;
    border-radius: 8px;
    color: white;
    z-index: 1000;
    min-width: 200px;
  }
  #controls h3 { margin: 0 0 10px 0; font-size: 16px; }
  #controls label { display: block; margin: 10px 0 5px 0; font-size: 12px; }
  #controls input[type="range"] { width: 100%; }
  #controls .value { display: inline-block; float: right; font-weight: bold; }
  #controls button {
    width: 100%;
    padding: 8px;
    margin: 10px 0 0 0;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  #controls button:hover { background: #1976D2; }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 20px 32px;
    border-radius: 8px;
    font-size: 16px;
    display: none;
    z-index: 2000;
  }
</style>
</head>
<body>

<div id="menu">
  <h2>Select Scene</h2>
  <button onclick="loadScene('factory')">Factory</button>
  <button onclick="loadScene('neo_tokyo')">Neo Tokyo</button>
  <button onclick="loadScene('snowfall')">Snowfall</button>
  <button onclick="loadScene('refinery')">Refinery</button>
  <button onclick="loadScene('vineyard')">Vineyard</button>
  <button onclick="loadScene('forest')">Forest</button>
    <button onclick="loadScene('oldforest')">Old Forest</button>
</div>

<div id="loading">Loading…</div>
<div id="errlog" style="position:absolute;bottom:80px;left:20px;max-width:500px;max-height:200px;overflow-y:auto;background:rgba(180,0,0,0.85);color:#fff;font-size:11px;font-family:monospace;padding:8px 12px;border-radius:6px;z-index:3000;display:none;"></div>

<div id="info">
  <strong>Controls:</strong><br>
  WASD - Move | Space - Up | Shift - Down<br>
  C - Toggle Camera Mode<br>
  Click - Enable Mouse Look (Walking Mode)
</div>

<div id="controls">
  <h3>Settings</h3>
  <label>FOV: <span class="value" id="fovValue">75</span></label>
  <input type="range" id="fovSlider" min="30" max="120" value="75" step="1">
  <label>Speed: <span class="value" id="speedValue">0.20</span></label>
  <input type="range" id="speedSlider" min="0.01" max="0.5" value="0.20" step="0.01">
  <button id="wireframeToggle">Toggle Wireframe</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/loaders/DRACOLoader.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/controls/OrbitControls.js";

// ─── Scene setup ──────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaaaaaa);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 0.5, 1);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;  // critical for correct texture brightness
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights — kept high so untextured meshes are never solid black
const dirLight1 = new THREE.DirectionalLight(0xffffff, 3);
dirLight1.position.set(5, 10, 7.5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 2);
dirLight2.position.set(-5, 10, -7.5);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight3.position.set(0, -5, 0);   // fill from below so undersides aren't black
scene.add(dirLight3);

scene.add(new THREE.AmbientLight(0xffffff, 2.0));  // strong ambient = no pure-black shadows

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x888888, 1.5);
hemiLight.position.set(0, 20, 0);
scene.add(hemiLight);

// ─── Loaders ──────────────────────────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/libs/draco/');

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

const textureLoader = new THREE.TextureLoader();

// ─── Texture cache ────────────────────────────────────────────────────────────
// Keeps loaded textures in memory so switching scenes doesn't re-fetch.
const textureCache = new Map();

// ─── On-screen error log ──────────────────────────────────────────────────────
const errlogEl = document.getElementById('errlog');
let errCount = 0;
function logError(msg) {
  errCount++;
  errlogEl.style.display = 'block';
  const line = document.createElement('div');
  line.textContent = msg;
  errlogEl.appendChild(line);
  errlogEl.scrollTop = errlogEl.scrollHeight;
  console.error(msg);
}

/**
 * Load a texture from ./textures/<name> and apply standard repeat wrapping.
 * Returns the cached copy if already loaded.
 * repeatX / repeatY default to 2.
 */
function loadTexture(filename, repeatX = 2, repeatY = 2) {
  const key = `${filename}::${repeatX}::${repeatY}`;
  if (textureCache.has(key)) return textureCache.get(key);

  const tex = textureLoader.load(
    `./textures/${filename}`,
    undefined, undefined,
    () => logError(`Texture 404: ./textures/${filename}`)
  );
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  textureCache.set(key, tex);
  return tex;
}

// ─── Material builder ─────────────────────────────────────────────────────────
// All textures live in ./textures/<name>.webp
// Per-material overrides (metalness, roughness, transparency, repeat) live here.
// Any name not listed falls back to <name>.webp with sensible defaults.

const MATERIAL_OVERRIDES = {
  // Transparent / special materials
  glass1:          { metalness: 0.1, roughnessVal: 0.05, color: 0x88ccff, transparent: true, opacity: 0.35 },
  glass2solid:     { metalness: 0.1, roughnessVal: 0.05 },
  crackedglass1:   { metalness: 0.0, roughnessVal: 0.2  },

  // Metals
  metal1:          { metalness: 0.8, roughnessVal: 0.35 },
  metalplate:      { metalness: 0.8, roughnessVal: 0.4  },
  metalplates1:    { metalness: 0.75,roughnessVal: 0.4  },
  corrugatediron1: { metalness: 0.7, roughnessVal: 0.5  },
  HazardStripeSolid1: { metalness: 0.6, roughnessVal: 0.5 },
  HazardStripe1:   { metalness: 0.5, roughnessVal: 0.55 },
  fan1:            { metalness: 0.75,roughnessVal: 0.4  },
  wheel1:          { metalness: 0.5, roughnessVal: 0.6  },
  wheel2:          { metalness: 0.5, roughnessVal: 0.6  },
  bin1:            { metalness: 0.5, roughnessVal: 0.5  },
  bin2:            { metalness: 0.5, roughnessVal: 0.5  },
  Canister1:       { metalness: 0.6, roughnessVal: 0.45 },
  truckstuff:      { metalness: 0.6, roughnessVal: 0.5  },
  FlourescentLight1: { metalness: 0.4, roughnessVal: 0.3 },
  keypad1:         { metalness: 0.4, roughnessVal: 0.5  },

  // Concrete / stone
  concrete2:       { metalness: 0.0, roughnessVal: 0.95 },
  concrete4:       { metalness: 0.0, roughnessVal: 0.95 },
  darkconcrete1:   { metalness: 0.0, roughnessVal: 0.95 },
  concretetile:    { metalness: 0.0, roughnessVal: 0.9  },
  rock1:           { metalness: 0.0, roughnessVal: 0.95 },
  Rock7:           { metalness: 0.0, roughnessVal: 0.95 },
  Sandygravel01:   { metalness: 0.0, roughnessVal: 0.95 },
  yellowtopwall:   { metalness: 0.0, roughnessVal: 0.9  },
  bluecontainermat:{ metalness: 0.3, roughnessVal: 0.6  },
  cratetex1:       { metalness: 0.1, roughnessVal: 0.8  },

  // Wood / planks
  wood_seamless2:  { metalness: 0.0, roughnessVal: 0.9  },
  cleanWood:       { metalness: 0.0, roughnessVal: 0.85 },
  oldWood:         { metalness: 0.0, roughnessVal: 0.95 },
  basicPlank:      { metalness: 0.0, roughnessVal: 0.9  },
  log_texture:     { metalness: 0.0, roughnessVal: 0.95 },
  bamboobranch:    { metalness: 0.0, roughnessVal: 0.9  },

  // Bark / trees
  tree2abark:      { metalness: 0.0, roughnessVal: 0.95 },
  treeblog:        { metalness: 0.0, roughnessVal: 0.95 },

  // Ground / organic
  dirt1:           { metalness: 0.0, roughnessVal: 1.0  },
  forestfloor1:    { metalness: 0.0, roughnessVal: 1.0  },
  moss1:           { metalness: 0.0, roughnessVal: 1.0  },
  mossedgetransiIelwEQyuVx: { metalness: 0.0, roughnessVal: 1.0 },
  vines1:          { metalness: 0.0, roughnessVal: 0.95, transparent: true, opacity: 0.99 },

  // Foliage / plants (alpha cutout)
  plant02:         { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  fern1:           { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  leaf2textures:   { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  weed1:           { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  weed2:           { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  weed3:           { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  weed4:           { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  weed5:           { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  flowerpatchgreen:  { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  flowerpatchyellow: { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },
  flowerpatchwhite:  { metalness: 0.0, roughnessVal: 0.9, transparent: true, opacity: 0.99, alphaTest: 0.5 },

  // Mushrooms
  mushroom1:       { metalness: 0.0, roughnessVal: 0.85 },
  mushroom2:       { metalness: 0.0, roughnessVal: 0.85 },
  redmushroom:     { metalness: 0.0, roughnessVal: 0.85 },
  agaricus_dulcidulus_mushroom_17_10_06_3: { metalness: 0.0, roughnessVal: 0.85 },

  // Misc
  plastic1:        { metalness: 0.05, roughnessVal: 0.6 },
  '02-Default':    { metalness: 0.1,  roughnessVal: 0.8 },
  '6bd0da5e_dds':  { metalness: 0.1,  roughnessVal: 0.8 },
  a:               { metalness: 0.0,  roughnessVal: 0.9 },
};

// ─── Texture filename aliases ─────────────────────────────────────────────────
// Maps GLTF material names → actual .webp filenames when they differ.
const TEXTURE_ALIASES = {
  'tree2aleaf':          'leaf2textures',
  'tree2bleaf':          'leaf2textures',
  'treebleaf':           'leaf2textures',
  'mossedgetransparent': 'mossedgetransiIelwEQyuVx',
  'BlueFlowerPallete':   'flowerpatchwhite',
  'ac2965d8_dds':        '6bd0da5e_dds',       // best available substitute
  'Material':            'concrete2',           // generic fallback
  'NONE/ERROR':          null,                  // no texture — grey fallback
};

function isAlphaFoliage(name) {
  return /leaf|weed|fern|flower|vine|plant|bamboo|moss/i.test(name);
}

function buildMaterial(matName) {
  // 'NONE/ERROR' slots → invisible (used as collision/hidden geometry)
  if (!matName || matName === 'NONE/ERROR') {
    return new THREE.MeshStandardMaterial({ visible: false });
  }

  const alias   = TEXTURE_ALIASES.hasOwnProperty(matName) ? TEXTURE_ALIASES[matName] : matName;
  const texName = alias;  // null = no texture file, use grey
  const ov = MATERIAL_OVERRIDES[matName] ?? MATERIAL_OVERRIDES[texName] ?? {};

  const params = {
    side:        THREE.DoubleSide,
    metalness:   ov.metalness    ?? 0.1,
    roughness:   ov.roughnessVal ?? 0.8,
    transparent: ov.transparent  ?? false,
    opacity:     ov.opacity      ?? 1.0,
  };

  if (ov.alphaTest !== undefined) params.alphaTest = ov.alphaTest;
  if (ov.color     !== undefined) params.color     = new THREE.Color(ov.color);

  // Load texture. Use alias if present; skip map entirely if alias is null.
  const foliage = isAlphaFoliage(matName) || isAlphaFoliage(texName || '');
  if (foliage && !ov.transparent) {
    params.transparent = true;
    params.opacity     = 0.99;
    params.alphaTest   = 0.5;
  }

  if (texName && !ov.color) {
    params.map = loadTexture(`${texName}.webp`, 2, 2);
  } else if (!texName) {
    // No texture file available — use a neutral grey so the mesh is still visible
    params.color = new THREE.Color(0x888888);
  }

  return new THREE.MeshStandardMaterial(params);
}

// ─── Vertex-colour → material index decoder ──────────────────────────────────
// The exporter encodes each face's material index into vertexColors[0].r:
//   materialIndex = floor(r * 256 / 10)
// This matches the original engine's filter() function exactly.
// materialIndex 25 (0x19) = hidden/collision-only mesh → invisible.
//
// Returns an array of THREE.BufferGeometry groups sorted by start index,
// each referencing the correct index into the materials array.
// Also returns a set of materialIndex values actually used.
function decodeVertexColorGroups(geometry, matCount) {
  const colorAttr = geometry.attributes.color;
  const indexArr  = geometry.index?.array;

  if (!colorAttr || !indexArr) return null;

  const faceCount = indexArr.length / 3;
  const faceMatIdx = new Int32Array(faceCount);

  for (let f = 0; f < faceCount; f++) {
    const vi  = indexArr[f * 3];               // first vertex of face
    const r   = colorAttr.getX(vi);            // red channel [0..1]
    const idx = Math.floor(r * 256 / 10);      // decode material index
    faceMatIdx[f] = (idx >= 0 && idx < matCount) ? idx : 0;
  }

  // Group consecutive faces with the same material index.
  const groups = [];
  let gStart = 0;
  let gMat   = faceMatIdx[0];

  for (let f = 1; f <= faceCount; f++) {
    const mat = f < faceCount ? faceMatIdx[f] : -1;
    if (mat !== gMat) {
      groups.push({ start: gStart * 3, count: (f - gStart) * 3, materialIndex: gMat });
      gStart = f;
      gMat   = mat;
    }
  }

  return groups;
}

// ─── Scene state ──────────────────────────────────────────────────────────────
let currentScene = null;
let allMeshes = [];
let wireframeEnabled = false;

const GLTF_BASE_PATH = '/draco/';
const loadingEl = document.getElementById('loading');

// ─── Load scene ───────────────────────────────────────────────────────────────
window.loadScene = function (sceneName) {
  if (currentScene) {
    scene.remove(currentScene);
    allMeshes = [];
  }

  const filename = `${GLTF_BASE_PATH}${sceneName}.gltf`;
  loadingEl.style.display = 'block';
  console.log(`Loading ${filename}…`);

  gltfLoader.load(filename, (gltf) => {
    loadingEl.style.display = 'none';
    const gltfJson = gltf.parser.json;

    const node0    = gltfJson.nodes?.[0];
    const extras   = node0?.extras ?? {};
    const matNames = extras.materials ?? [];   // full list, e.g. 70 entries
    const extGroups= extras.groups    ?? [];   // [{start, count, materialIndex}, ...]

    console.log('material count:', matNames.length, 'group count:', extGroups.length);

    // Build ALL materials indexed by their position in extras.materials.
    // materialIndex in each group is a direct index into this array.
    const materials = matNames.map(name => buildMaterial(name));

    gltf.scene.traverse((node) => {
      if (!node.isMesh) return;
      allMeshes.push(node);

      const geo = node.geometry;

      // TEXCOORD_0 contains world-space-scale UVs (range -81..+78) — that's the lightmap channel.
      // TEXCOORD_1 contains the normalised 0-1 per-material UVs we actually want for diffuse maps.
      // Swap them: promote uv1 → uv so MeshStandardMaterial.map samples the right coords.
      if (geo.attributes.uv1 && !geo._uvSwapped) {
        const realUV = geo.attributes.uv1;
        geo.setAttribute('uv', realUV);
        geo._uvSwapped = true;
      }

      geo.clearGroups();
      extGroups.forEach(g => geo.addGroup(g.start, g.count, g.materialIndex));
      node.material = materials;

      if (wireframeEnabled) {
        materials.forEach(m => { m.wireframe = true; });
      }
    });

    scene.add(gltf.scene);
    currentScene = gltf.scene;

    // AUTO DEBUG - logs to console immediately after load
    let totalIdx = 0, totalGrouped = 0;
    gltf.scene.traverse(n => {
      if (!n.isMesh) return;
      const g = n.geometry;
      totalIdx += g.index ? g.index.count : 0;
      totalGrouped += g.groups.reduce((s,gr)=>s+gr.count,0);
      console.log('MESH', n.name, 
        'indices:', g.index?.count,
        'groups:', g.groups.length,
        'grouped:', g.groups.reduce((s,gr)=>s+gr.count,0),
        'attrs:', Object.keys(g.attributes).join(',')
      );
    });
    console.log('TOTAL indices:', totalIdx, 'TOTAL grouped:', totalGrouped, 'UNgrouped:', totalIdx - totalGrouped);

    camera.position.set(0, playerHeight, 1);
    yaw   = 0;
    pitch = 0;
  }, undefined, (error) => {
    loadingEl.style.display = 'none';
    logError(`Failed to load ${filename}: ${error.message}`);
    alert(`Failed to load ${sceneName}.gltf — check the red error log on screen.`);
  });
};

// ─── Wireframe toggle ─────────────────────────────────────────────────────────
document.getElementById('wireframeToggle').addEventListener('click', () => {
  wireframeEnabled = !wireframeEnabled;
  allMeshes.forEach(mesh => {
    (Array.isArray(mesh.material) ? mesh.material : [mesh.material])
      .forEach(mat => { mat.wireframe = wireframeEnabled; });
  });
});

// ─── Orbit controls (freecam) ─────────────────────────────────────────────────
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping  = true;
orbitControls.dampingFactor  = 0.05;
orbitControls.enablePan      = false;
orbitControls.enabled        = false;   // start in walking mode

// ─── FOV / Speed sliders ──────────────────────────────────────────────────────
document.getElementById('fovSlider').addEventListener('input', (e) => {
  const fov = parseFloat(e.target.value);
  camera.fov = fov;
  camera.updateProjectionMatrix();
  document.getElementById('fovValue').textContent = fov;
});

document.getElementById('speedSlider').addEventListener('input', (e) => {
  const speed = parseFloat(e.target.value);
  walkSpeed = flySpeed = speed;
  document.getElementById('speedValue').textContent = speed.toFixed(2);
});

// ─── Walking / freecam ────────────────────────────────────────────────────────
let cameraMode  = 'walking';
let walkSpeed   = 0.20;
let flySpeed    = 0.20;
const playerHeight = 0.5;
let pitch = 0;
let yaw   = 0;

camera.position.y = playerHeight;

renderer.domElement.addEventListener('click', () => {
  if (cameraMode === 'walking') renderer.domElement.requestPointerLock();
});

document.addEventListener('mousemove', (e) => {
  if (cameraMode === 'walking' && document.pointerLockElement === renderer.domElement) {
    const sensitivity = 0.002;
    yaw   -= e.movementX * sensitivity;
    pitch -= e.movementY * sensitivity;
    pitch  = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
  }
});

const move = { forward: false, backward: false, left: false, right: false, up: false, down: false };

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyC':
      cameraMode = cameraMode === 'freecam' ? 'walking' : 'freecam';
      if (cameraMode === 'walking') {
        orbitControls.enabled  = false;
        camera.position.y      = playerHeight;
      } else {
        orbitControls.enabled = true;
        if (document.pointerLockElement === renderer.domElement) document.exitPointerLock();
      }
      break;
    case 'KeyW':     move.forward   = true; break;
    case 'KeyS':     move.backward  = true; break;
    case 'KeyA':     move.left      = true; break;
    case 'KeyD':     move.right     = true; break;
    case 'Space':    move.up        = true; break;
    case 'ShiftLeft': move.down     = true; break;
  }
});

document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW':     move.forward   = false; break;
    case 'KeyS':     move.backward  = false; break;
    case 'KeyA':     move.left      = false; break;
    case 'KeyD':     move.right     = false; break;
    case 'Space':    move.up        = false; break;
    case 'ShiftLeft': move.down     = false; break;
  }
});

// ─── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  if (cameraMode === 'walking') {
    camera.rotation.order = 'YXZ';
    camera.rotation.y     = yaw;
    camera.rotation.x     = pitch;
  }

  const speed = cameraMode === 'freecam' ? flySpeed : walkSpeed;
  const dir   = new THREE.Vector3();
  camera.getWorldDirection(dir);

  if (cameraMode === 'walking') { dir.y = 0; dir.normalize(); }

  if (move.forward)  camera.position.addScaledVector(dir,  speed);
  if (move.backward) camera.position.addScaledVector(dir, -speed);

  const strafe = new THREE.Vector3();
  camera.getWorldDirection(strafe);
  if (cameraMode === 'walking') strafe.y = 0;
  strafe.cross(camera.up).normalize();

  if (move.left)  camera.position.addScaledVector(strafe, -speed);
  if (move.right) camera.position.addScaledVector(strafe,  speed);
  if (move.up)    camera.position.y += speed;
  if (move.down)  camera.position.y -= speed;

  if (cameraMode === 'freecam') orbitControls.update();

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
